<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>
    Login | JobQuestAI
  </title>

  <!-- Bootstrap Icons -->

  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- CSS -->

  <link rel="stylesheet"
  href="../style.css">

</head>

<body>

<div class="popup-overlay"
id="authModal"
style="display:flex;">

  <div class="auth-modal">

    <!-- HEADER -->

    <div class="auth-header">

      <h2 id="authTitle">
        Login
      </h2>

      <span onclick="closeAuth()">
        ✖
      </span>

    </div>

    <!-- TOGGLE -->

    <div class="auth-switch">

      <div id="switchIndicator"></div>

      <button
      id="loginTab"
      onclick="switchToLogin()">

        Login

      </button>

      <button
        id="registerTab"
        onclick="switchToSignup()">

          Register

      </button>

    </div>

    <!-- FORM -->

    <div class="auth-form">

      <!-- NAME -->

      <div id="nameField"
      style="display:none;">

        <label>
          Full Name
        </label>

        <input
        type="text"
        id="name"
        placeholder="Enter your full name">

      </div>

      <!-- EMAIL -->

      <label>
        Email Address
      </label>

      <input
      type="email"
      id="email"
      placeholder="Enter your email">

      <!-- PASSWORD -->

      <label>
        Password
      </label>

      <input
      type="password"
      id="password"
      placeholder="Enter your password">

      <div class="forgot-password">

        <span onclick="forgotPassword()">

          Forgot Password?

        </span>

      </div>

      <!-- BUTTON -->

      <button
      type="button"
      class="auth-btn"
      id="authBtn">

      </button>

    </div>

  </div>

</div>

<!-- FIREBASE -->

<script type="module"
src="../firebase.js"></script>

<!-- JS -->

<script src="../script.js"></script>

</body>
</html>
